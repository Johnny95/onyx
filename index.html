<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Camera Demo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    video {
      width: 100%;
      height: auto;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 10px;
    }

    img {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline></video>
  <br>
  <button onclick="takePhoto()">Snap</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="result"/>

  <script>
    const video = document.getElementById('video');

    // ✅ Start camera
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => video.srcObject = stream)
      .catch(err => alert("Camera access denied"));

    function takePhoto() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0);

      const data = canvas.toDataURL('image/png');

      // ✅ show image immediately
      document.getElementById('result').src = data;

      // ✅ send to backend (FIXED URL)
      fetch('https://onyx-l04o.onrender.com/upload', {
        method: 'POST',
        body: JSON.stringify({ image: data }),
        headers: { 'Content-Type': 'application/json' }
      });

      startPolling();
    }

    function startPolling() {
  setInterval(async () => {
    const res = await fetch('https://onyx-l04o.onrender.com/result');
    const data = await res.json();

    console.log("Polling result:", data); // 👈 ADD THIS

    if (data.card) {
      applyCardChange(data.image, data.card);
    }
  }, 1000);
}

   function applyCardChange(imageData, card) {
  const img = new Image();
  img.src = imageData;

  img.onload = () => {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Draw original image
    ctx.drawImage(img, 0, 0);

    // ✅ BIG visible test box
    ctx.fillStyle = "red";
    ctx.fillRect(50, 50, 300, 300);

    // ✅ Add text (the card)
    ctx.fillStyle = "white";
    ctx.font = "bold 50px Arial";
    ctx.fillText(card, 80, 200);

    // Update image on screen
    document.getElementById('result').src = canvas.toDataURL();
  };
}
  </script>

</body>
</html>
